<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 2 — Demo UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0d0d0f;
        --panel:   #131316;
        --line:    #2a2a30;
        --ink:     #e0e0e6;
        --ink-dim: #606070;
        --accent:  #22d3ee;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'JetBrains Mono', monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
      }

      /* Canvas */
      .viewport {
        position: relative;
        width: 600px;
        height: 600px;
        flex-shrink: 0;
        border: 1px solid var(--line);
      }

      #astro_canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
        border-bottom : 1px solid var(--line);
        border-right : 1px solid var(--line);
      }

      /* Panel boutons */
      .panel {
        width: 260px;
        border: 1px solid var(--line);
        border-left: none;
        height: 600px;
        display: flex;
        flex-direction: column;
        padding: 24px 20px;
        gap: 20px;
        background: var(--panel);
      }

      .config_label {
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink-dim);
        display: block;
        margin-bottom: 10px;
      }

      .config_options { display: flex; gap: 8px; flex-wrap: wrap; }

      .btn_config {
        width: 28px;
        height: 28px;
        border: 1px solid var(--line);
        cursor: pointer;
        transition: border-color .15s;
        position: relative;
      }

      .btn_config.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }

      .config_objet_btn {
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink-dim);
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all .15s;
      }

      .config_objet_btn:hover,
      .btn_active {
        background: var(--ink);
        color: var(--bg);
        border-color: var(--ink);
      }
    </style>
  </head>
  <body>

    <div class="viewport">
      <canvas id="astro_canvas" style="touch-action: none"></canvas>
    </div>

    <div class="panel">
      <div>
        <span class="config_label">Casque</span>
        <div class="config_options" id="config_helmet">
          <button class="btn_config active" data-color="#ffffff" style="background:#ffffff"></button>
          <button class="btn_config" data-color="#0a0a0a" style="background:#0a0a0a;border-color:rgba(255,255,255,0.3)"></button>
          <button class="btn_config" data-color="#22d3ee" style="background:#22d3ee"></button>
          <button class="btn_config" data-color="#f97316" style="background:#f97316"></button>
          <button class="btn_config" data-color="#dc2626" style="background:#dc2626"></button>
        </div>
      </div>

      <div>
        <span class="config_label">Combinaison</span>
        <div class="config_options" id="config_suit">
          <button class="btn_config active" data-color="#e5e5e5" style="background:#e5e5e5"></button>
          <button class="btn_config" data-color="#ffffff" style="background:#ffffff"></button>
          <button class="btn_config" data-color="#737373" style="background:#737373"></button>
          <button class="btn_config" data-color="#0a0a0a" style="background:#0a0a0a;border-color:rgba(255,255,255,0.3)"></button>
          <button class="btn_config" data-color="#22d3ee" style="background:#22d3ee"></button>
        </div>
      </div>

      <div>
        <span class="config_label">Objet</span>
        <div class="config_options" id="config_objet" style="flex-direction:column;align-items:flex-start;">
          <button class="config_objet_btn btn_active" data-acc="none">Aucun</button>
          <button class="config_objet_btn" data-acc="flag">Drapeau</button>
          <button class="config_objet_btn" data-acc="jetpack">Jetpack</button>
          <button class="config_objet_btn" data-acc="star">Étoile</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initDemoUi } from '/src/modules/demo_ui.js';
      initDemoUi();
    </script>
  </body>
</html>
